name: Dev Build Sanity Test for Fluf

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sanity-dev-test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install UI dependencies
        run: npm i
        working-directory: ./ui

      - name: Install Desktop dependencies
        run: npm i
        working-directory: ./desktop
  
      - name: Install Sanity Test dependencies
        run: npm i
        working-directory: ./test/sanity

      - name: Build desktop dev build
        run: npm run build:dev
        working-directory: ./desktop

      - name: Run Playwright Sanity Tests Agaisnt development build
        run: npm run test
        working-directory: ./test/sanity
