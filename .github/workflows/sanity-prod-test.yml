name: Prod Build Sanity Test for Fluf

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sanity-prod-test:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install UI dependencies
        run: npm i
        working-directory: ./ui

      - name: Install Desktop dependencies
        run: npm i
        working-directory: ./desktop

      - name: Install Sanity Test dependencies
        run: npm i
        working-directory: ./test/sanity

      - name: Install build dependencies
        run: npm i
        working-directory: ./build

      - name: Build production application
        run: npm run build
        working-directory: "./build"

      - name: Run Playwright Sanity Tests Agaisnt Production
        run: npm run test:prod
        working-directory: ./test/sanity
