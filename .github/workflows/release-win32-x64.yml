name: Build & Release fluf for win32-x64

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # TEST: Create a test directory and file
      - name: Create Test Artifact
        run: |
          mkdir test-release
          echo "Test release artifact" > test-release/README.txt
          echo "Build time: $(Get-Date)" >> test-release/README.txt
          Compress-Archive -Path test-release/* -DestinationPath test-release.zip

      # TEST: Upload using the CORRECT action
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: test-release.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}