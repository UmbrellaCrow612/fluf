@if (isLoading() && !error()) {
  <div>loading</div>
}

<!---->

@if (error() && !isLoading()) {
  <div>
    {{ error() }}
  </div>
}

<!---->
@if (!isLoading() && !error()) {
  <div class="editor_video_pane">
    <video
      [src]="videoSrc()"
      controls
      preload="metadata"
      style="max-width: 100%; max-height: 100%; width: 100%; height: 100%"
    ></video>
  </div>
}
