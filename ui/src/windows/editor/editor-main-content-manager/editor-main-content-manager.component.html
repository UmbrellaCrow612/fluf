<div class="editor_main_content_manager_container">
  @if (shouldRenderOpenFiles()) {
    <app-editor-open-files />
  }
  <div class="editor_main_content_manager_central_container">
    <div class="default_flex">
      <ng-container *ngComponentOutlet="mainContentComponentToRender()" />
    </div>

    @if (shouldRenderBottomSection()) {
      <div class="default_flex">
        <app-editor-main-content-bottom />
      </div>
    }
  </div>
</div>
