<div class="editor_path_breadcrumb_bar scroll_bar">
  @if (isLoading()) {
    <div>Loading</div>
  }

  <!---->

  @if (error()) {
    <div>
      {{ error() }}
    </div>
  }

  <!---->

  @if (!isLoading() && !error()) {
    @for (seg of segmentNodes(); track $index) {
      <div [matTooltip]="seg.path" class="bread_crumb" (click)="displayTree($event, seg)">
        {{ seg.name }}
      </div>
      @if (seg.isDirectory) {
        <mat-icon fontIcon="chevron_right" class="icon"/>
      }
    }
  }
</div>
