@if (!error()) {
  <div class="editor_file_explorer_tree_container scroll_bar">
    @for (node of rootNodeChildren(); track node.path) {
      <app-editor-file-explorer-tree-item
        [fileNode]="node"
        [depth]="0"
        [rootNodeChildren]="rootNodeChildren()"
        (rootNodeChildrenUpdated)="this.rootNodeChildrenUpdated.emit($event)"
        [activeNode]="activeNode()"
      />
    }
  </div>
}
<!---->

@if (error()) {
  <div>
    {{ error() }}
  </div>
}
