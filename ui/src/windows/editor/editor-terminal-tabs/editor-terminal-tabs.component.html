<div class="editor_terminal_tabs">
  <div class="editor_terminal_tabs_tab_items scroll_bar">
    @for (info of activeShells().values(); track $index) {
      <app-editor-terminal-tab-item
        label="Terminal"
        [shellInformation]="info"
      />
    }
  </div>

  <button
    matIconButton
    matTooltip="Add terminal"
    (click)="createNewTerminal()"
    [disabled]="isCreatingTerminal()"
  >
    <mat-icon fontIcon="add" />
  </button>
</div>
