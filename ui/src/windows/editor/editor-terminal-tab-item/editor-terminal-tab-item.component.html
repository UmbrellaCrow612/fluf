<div class="editor_terminal_tab_item" tabindex="0" [class.active]="isActive()">
  <span class="editor_terminal_tab_item_label">
    {{ label() }}
  </span>

  <span
    class="editor_terminal_tab_item_close"
    [matTooltip]="'delete ' + label()"
  >
    <mat-icon fontIcon="delete"></mat-icon>
  </span>
</div>
